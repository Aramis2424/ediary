server {
	listen 2323;
	server_name ediary2424;

	absolute_redirect off;
	server_tokens off;
	charset utf-8;

	include /etc/nginx/includes/swagger.conf;
	
	location /documentation {		
		alias /usr/share/nginx/html/readme;
		index index.html;
	}

	location /api/v1/ {
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		proxy_pass http://back:2424;
	}

	location = / {
		return 301 /logo.png;
	}
	location = /logo.png {
		alias /usr/share/nginx/html/static/logo.png;
		default_type image/png;
	}
	
	location /reserved {
		return 301 /;
	}
	
	location /legacy/ {
		root /usr/share/nginx/html/;
		index index.html;
		try_files $uri $uri/ /legacy/index.html;
	}

	location = /status {
		return 302 /status/;
	}
	location /status/ {
		alias /usr/share/nginx/html/status/;
		index index.html;
		try_files $uri $uri/ /status/index.html;
	}
	location /status/metrics {
		stub_status on;
	}
	
	location = /managment {
		return 302 /managment/;
	}
	location /managment/ {
		alias /usr/share/nginx/html/managment/;
		index index.html;
		try_files $uri $uri/ /managment/index.html;
	}

	location /admin/ {
		proxy_pass http://pgadmin:80/;
		proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Script-Name /admin;

        sub_filter_once off;
        sub_filter 'href="/' 'href="/admin/';
        sub_filter 'src="/'  'src="/admin/';
	}
}
